  <script>
(function () {
  const REPORT = JSON.parse(document.getElementById('report-data').textContent);
  const STORAGE_KEY = 'trufi-validation-' + REPORT.slug;
  const VIS_KEY = 'trufi-vis-' + REPORT.slug;

  const HIGHLIGHT_COLOR = '#f59e0b';
  const DIM_COLOR = '#94a3b8';
  const STOP_RADIUS = 2;
  const STOP_RADIUS_SELECTED = 4;

  function loadValidation() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
    catch { return {}; }
  }
  function saveValidation(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    updateProgress();
  }
  function loadVisibility() {
    try { return JSON.parse(localStorage.getItem(VIS_KEY) || '{}'); }
    catch { return {}; }
  }
  function saveVisibility(data) {
    localStorage.setItem(VIS_KEY, JSON.stringify(data));
  }

  const validation = loadValidation();
  const visibility = loadVisibility();
  let selectedOsmId = null;

  const overviewMap = L.map('overview-map', { scrollWheelZoom: true });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(overviewMap);
  overviewMap.setView([-17.39, -66.16], 12);

  const variantLayers = {};
  const routeMaps = {};

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
  }
  function hexColor(c) { return c && String(c).length >= 3 ? '#' + String(c).replace('#','') : '#64748b'; }
  function coordsToLatLngs(coords) {
    return coords.map(function (c) { return [c[1], c[0]]; });
  }
  function dirLabelHtml(label) {
    if (label === 'ida') return '<span class="dir-badge dir-ida">→ Ida</span>';
    if (label === 'vuelta') return '<span class="dir-badge dir-vuelta">← Vuelta</span>';
    return '<span class="dir-badge dir-unico">↔ Único</span>';
  }
  function dirLabelText(label) {
    if (label === 'ida') return 'Ida';
    if (label === 'vuelta') return 'Vuelta';
    return 'Único';
  }
  function buildPopup(v) {
    return dirLabelHtml(v.directionLabel) +
      ' <strong>' + esc(v.ref) + '</strong><br>' +
      esc(v.from) + ' → ' + esc(v.to) +
      (v.description ? '<br><em>' + esc(v.description) + '</em>' : '') +
      '<br><a href="' + v.osmUrl + '" target="_blank" rel="noopener">Ver en OSM</a>';
  }
  function addDirectionArrow(layerGroup, latlngs, color) {
    if (latlngs.length < 2) return null;
    var idx = Math.min(Math.floor(latlngs.length * 0.75), latlngs.length - 1);
    var p1 = latlngs[Math.max(0, idx - 1)];
    var p2 = latlngs[idx];
    var angle = Math.atan2(p2[0] - p1[0], p2[1] - p1[1]) * 180 / Math.PI;
    var marker = L.marker(p2, {
      icon: L.divIcon({
        className: 'dir-arrow-icon',
        html: '<div style="transform:rotate(' + angle + 'deg);color:' + color + ';font-weight:bold">▶</div>',
        iconSize: [14, 14],
        iconAnchor: [7, 7]
      }),
      interactive: false
    });
    marker.addTo(layerGroup);
    return marker;
  }

  function styleVariant(osmId) {
    var entry = variantLayers[osmId];
    if (!entry || !entry.visible) return;
    var v = entry.variant;
    var isSelected = selectedOsmId === osmId;
    var baseColor = hexColor(v.routeColor || entry.refColor);

    if (isSelected) {
      entry.line.setStyle({ color: HIGHLIGHT_COLOR, weight: 6, opacity: 1 });
      if (entry.arrow) entry.arrow.setOpacity(1);
    } else if (selectedOsmId !== null) {
      entry.line.setStyle({ color: DIM_COLOR, weight: 3, opacity: 0.35 });
      if (entry.arrow) entry.arrow.setOpacity(0.3);
    } else {
      entry.line.setStyle({ color: baseColor, weight: 4, opacity: 0.85 });
      if (entry.arrow) entry.arrow.setOpacity(0.9);
    }

    entry.stops.clearLayers();
    if (isSelected && v.stops && v.stops.length) {
      v.stops.forEach(function (s) {
        L.circleMarker([s.lat, s.lon], {
          radius: STOP_RADIUS_SELECTED,
          color: HIGHLIGHT_COLOR,
          fillColor: HIGHLIGHT_COLOR,
          fillOpacity: 0.85,
          weight: 1
        }).bindPopup(esc(s.name)).addTo(entry.stops);
      });
    }
  }

  function refreshAllStyles() {
    Object.keys(variantLayers).forEach(function (id) { styleVariant(Number(id)); });
    var anyVisible = Object.values(variantLayers).some(function (e) { return e.visible; });
    document.getElementById('map-hint').style.display = anyVisible ? 'none' : 'block';
    var n = Object.values(variantLayers).filter(function (e) { return e.visible; }).length;
    var status = n + ' ruta(s) visible(s)';
    if (selectedOsmId && variantLayers[selectedOsmId]) {
      var sv = variantLayers[selectedOsmId].variant;
      status += ' · Seleccionada: ' + dirLabelText(sv.directionLabel) + ' ' + sv.from + ' → ' + sv.to;
    }
    document.getElementById('map-status').textContent = status;
  }

  function selectVariant(osmId) {
    selectedOsmId = osmId;
    document.querySelectorAll('.vis-variant').forEach(function (el) {
      el.classList.toggle('selected', Number(el.dataset.osmId) === osmId);
    });
    refreshAllStyles();
    var entry = variantLayers[osmId];
    if (entry && entry.line) {
      overviewMap.fitBounds(entry.line.getBounds(), { padding: [48, 48] });
    }
  }

  function setVariantVisible(osmId, visible) {
    var entry = variantLayers[osmId];
    if (!entry) return;
    entry.visible = visible;
    visibility[osmId] = visible;
    saveVisibility(visibility);

    if (visible) {
      entry.group.addTo(overviewMap);
    } else {
      overviewMap.removeLayer(entry.group);
      if (selectedOsmId === osmId) selectedOsmId = null;
    }
    var cb = document.querySelector('.vis-variant[data-osm-id="' + osmId + '"] input');
    if (cb) cb.checked = visible;
    refreshAllStyles();
  }

  REPORT.refGroups.forEach(function (group) {
    var refColor = hexColor(group.routeColor);

    group.variants.forEach(function (v) {
      if (!v.coordinates || !v.coordinates.length) return;

      var latlngs = coordsToLatLngs(v.coordinates);
      var groupLayer = L.layerGroup();
      var stopsLayer = L.layerGroup();
      var line = L.polyline(latlngs, { color: refColor, weight: 4, opacity: 0.85 });
      line.bindPopup(buildPopup(v));
      line.on('click', function (e) {
        L.DomEvent.stopPropagation(e);
        if (!variantLayers[v.osmId].visible) setVariantVisible(v.osmId, true);
        selectVariant(v.osmId);
      });
      line.addTo(groupLayer);
      var arrow = addDirectionArrow(groupLayer, latlngs, refColor);
      stopsLayer.addTo(groupLayer);

      variantLayers[v.osmId] = {
        osmId: v.osmId,
        ref: group.ref,
        refColor: group.routeColor,
        variant: v,
        group: groupLayer,
        line: line,
        stops: stopsLayer,
        arrow: arrow,
        visible: false
      };
    });
  });

  var visList = document.getElementById('visibility-list');
  REPORT.refGroups.forEach(function (group) {
    var refBlock = document.createElement('div');
    refBlock.className = 'vis-ref-group';
    refBlock.dataset.ref = group.ref;

    var refHead = document.createElement('div');
    refHead.className = 'vis-ref-head';
    var refCb = document.createElement('input');
    refCb.type = 'checkbox';
    refCb.title = 'Mostrar/ocultar línea ' + group.ref;
    refHead.appendChild(refCb);
    refHead.appendChild(document.createTextNode(' Línea ' + group.ref + ' (' + group.variants.length + ')'));
    refBlock.appendChild(refHead);

    group.variants.forEach(function (v) {
      if (!variantLayers[v.osmId]) return;
      var row = document.createElement('label');
      row.className = 'vis-variant';
      row.dataset.osmId = String(v.osmId);
      row.dataset.search = [v.ref, v.from, v.to, v.description, v.name].join(' ').toLowerCase();

      var cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = !!visibility[v.osmId];
      if (cb.checked) setVariantVisible(v.osmId, true);

      var text = document.createElement('div');
      text.className = 'vis-variant-text';
      text.innerHTML = dirLabelHtml(v.directionLabel) +
        '<strong>' + esc(v.from) + ' → ' + esc(v.to) + '</strong>' +
        (v.description ? '<br><span style="color:var(--muted)">' + esc(v.description) + '</span>' : '');

      row.appendChild(cb);
      row.appendChild(text);
      refBlock.appendChild(row);

      cb.addEventListener('change', function () {
        setVariantVisible(v.osmId, cb.checked);
        updateRefCheckbox(refCb, group);
      });
      row.addEventListener('click', function (e) {
        if (e.target === cb) return;
        selectVariant(v.osmId);
        if (!cb.checked) { cb.checked = true; setVariantVisible(v.osmId, true); updateRefCheckbox(refCb, group); }
      });
    });

    refCb.addEventListener('change', function () {
      group.variants.forEach(function (v) {
        if (variantLayers[v.osmId]) setVariantVisible(v.osmId, refCb.checked);
      });
      refBlock.querySelectorAll('.vis-variant input').forEach(function (c) { c.checked = refCb.checked; });
    });

    refHead.addEventListener('click', function (e) {
      if (e.target !== refCb) { refCb.checked = !refCb.checked; refCb.dispatchEvent(new Event('change')); }
    });

    visList.appendChild(refBlock);
  });

  function updateRefCheckbox(refCb, group) {
    var checked = group.variants.filter(function (v) { return variantLayers[v.osmId] && variantLayers[v.osmId].visible; }).length;
    refCb.checked = checked === group.variants.length;
    refCb.indeterminate = checked > 0 && checked < group.variants.length;
  }
  REPORT.refGroups.forEach(function (group) {
    var refBlock = visList.querySelector('[data-ref="' + group.ref.replace(/"/g, '') + '"]');
    if (!refBlock) return;
    var refCb = refBlock.querySelector('.vis-ref-head input');
    updateRefCheckbox(refCb, group);
  });

  document.getElementById('vis-all').addEventListener('click', function () {
    Object.keys(variantLayers).forEach(function (id) { setVariantVisible(Number(id), true); });
    visList.querySelectorAll('input[type=checkbox]').forEach(function (c) { c.checked = true; c.indeterminate = false; });
  });
  document.getElementById('vis-none').addEventListener('click', function () {
    Object.keys(variantLayers).forEach(function (id) { setVariantVisible(Number(id), false); });
    selectedOsmId = null;
    visList.querySelectorAll('input[type=checkbox]').forEach(function (c) { c.checked = false; c.indeterminate = false; });
    refreshAllStyles();
  });
  document.getElementById('fit-visible').addEventListener('click', function () {
    var bounds = L.latLngBounds([]);
    Object.values(variantLayers).forEach(function (e) {
      if (e.visible && e.line) e.line.getLatLngs().forEach(function (ll) {
        if (Array.isArray(ll[0])) ll.forEach(function (p) { bounds.extend(p); });
        else bounds.extend(ll);
      });
    });
    if (bounds.isValid()) overviewMap.fitBounds(bounds, { padding: [32, 32] });
  });

  overviewMap.on('click', function () {
    selectedOsmId = null;
    document.querySelectorAll('.vis-variant.selected').forEach(function (el) { el.classList.remove('selected'); });
    refreshAllStyles();
  });

  var container = document.getElementById('routes-container');
  REPORT.refGroups.forEach(function (group) {
    var card = document.createElement('article');
    card.className = 'route-card';
    card.dataset.ref = group.ref;

    var header = document.createElement('div');
    header.className = 'route-header';
    header.innerHTML =
      '<span class="route-badge">' + esc(group.ref) + '</span>' +
      '<span class="route-title">' + esc(group.routeLongName || group.ref) + '</span>' +
      '<span class="route-meta">' + group.variants.length + ' variantes · GTFS ' + group.gtfsRouteId + '</span>';
    card.appendChild(header);

    var body = document.createElement('div');
    body.className = 'route-body';
    var grid = document.createElement('div');
    grid.className = 'route-grid';

    var mapDiv = document.createElement('div');
    mapDiv.className = 'route-map';
    grid.appendChild(mapDiv);

    var variantsCol = document.createElement('div');
    group.variants.forEach(function (v) {
      var block = document.createElement('div');
      block.className = 'variant-block';
      block.dataset.osmId = String(v.osmId);
      block.dataset.search = [v.ref, v.name, v.from, v.to, v.description].join(' ').toLowerCase();

      var statusCls = v.status === 'ok' ? 'status-ok' : 'status-err';
      var statusTxt = v.status === 'ok' ? '✅ OK' : '❌ ' + esc(v.errorMessage);

      block.innerHTML =
        '<h4>' + dirLabelHtml(v.directionLabel) + esc(v.from) + ' → ' + esc(v.to) + '</h4>' +
        '<div class="variant-links">' +
          '<a href="' + v.osmUrl + '" target="_blank" rel="noopener">OSM #' + v.osmId + '</a>' +
          '<a href="#" class="show-on-map">Ver en mapa</a>' +
        '</div>' +
        '<div class="route-meta">' + esc(v.name) + '</div>' +
        (v.description ? '<div class="route-meta">Variante: ' + esc(v.description) + '</div>' : '') +
        '<div class="route-meta ' + statusCls + '">' + statusTxt + ' · ' + v.stopCount + ' paradas</div>' +
        (v.stops.length ? '<ol class="stops-list">' + v.stops.map(function(s){ return '<li>' + esc(s.name) + '</li>'; }).join('') + '</ol>' : '');

      var valDiv = document.createElement('div');
      valDiv.className = 'validation';
      valDiv.innerHTML =
        '<label>Estado de validación</label>' +
        '<div class="validation-row">' +
          '<button type="button" data-status="ok">✓ Correcta</button>' +
          '<button type="button" data-status="fix">⚠ Corregir</button>' +
          '<button type="button" data-status="reject">✗ No es nuestra</button>' +
        '</div>' +
        '<label>Observaciones</label>' +
        '<textarea placeholder="Detalle de correcciones…"></textarea>';

      var saved = validation[v.osmId] || {};
      valDiv.querySelectorAll('[data-status]').forEach(function (btn) {
        if (saved.status === btn.dataset.status) btn.classList.add('active');
        btn.addEventListener('click', function () {
          valDiv.querySelectorAll('[data-status]').forEach(function (b) { b.classList.remove('active'); });
          btn.classList.add('active');
          validation[v.osmId] = validation[v.osmId] || {};
          validation[v.osmId].status = btn.dataset.status;
          validation[v.osmId].updatedAt = new Date().toISOString();
          saveValidation(validation);
        });
      });
      var notes = valDiv.querySelector('textarea');
      notes.value = saved.notes || '';
      notes.addEventListener('input', function () {
        validation[v.osmId] = validation[v.osmId] || {};
        validation[v.osmId].notes = notes.value;
        validation[v.osmId].updatedAt = new Date().toISOString();
        saveValidation(validation);
      });

      block.appendChild(valDiv);
      block.querySelector('.show-on-map').addEventListener('click', function (e) {
        e.preventDefault();
        setVariantVisible(v.osmId, true);
        selectVariant(v.osmId);
        document.getElementById('overview-map').scrollIntoView({ behavior: 'smooth' });
      });

      variantsCol.appendChild(block);
    });

    grid.appendChild(variantsCol);
    body.appendChild(grid);
    card.appendChild(body);
    container.appendChild(card);

    header.addEventListener('click', function () {
      card.classList.toggle('open');
      if (card.classList.contains('open') && !routeMaps[group.ref]) initRefMap(group, mapDiv);
    });
  });

  function initRefMap(group, el) {
    var map = L.map(el, { scrollWheelZoom: false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OSM', maxZoom: 19 }).addTo(map);
    var bounds = L.latLngBounds([]);
    var hues = ['#2563eb','#dc2626','#16a34a','#9333ea','#d97706','#0891b2'];
    group.variants.forEach(function (v, i) {
      if (!v.coordinates.length) return;
      var color = hues[i % hues.length];
      var latlngs = coordsToLatLngs(v.coordinates);
      L.polyline(latlngs, { color: color, weight: 5 }).bindPopup(buildPopup(v)).addTo(map);
      addDirectionArrow(map, latlngs, color);
      latlngs.forEach(function (ll) { bounds.extend(ll); });
      v.stops.forEach(function (s) {
        L.circleMarker([s.lat, s.lon], { radius: STOP_RADIUS, color: color, fillOpacity: 0.7, weight: 1 })
          .bindPopup(esc(s.name)).addTo(map);
      });
    });
    if (bounds.isValid()) map.fitBounds(bounds, { padding: [16, 16] });
    routeMaps[group.ref] = map;
    setTimeout(function () { map.invalidateSize(); }, 200);
  }

  function applyFilters() {
    var q = document.getElementById('search').value.toLowerCase().trim();
    var refFilter = document.getElementById('filter-ref').value;
    document.querySelectorAll('.route-card').forEach(function (card) {
      var ref = card.dataset.ref;
      var visible = !refFilter || ref === refFilter;
      if (visible && q) {
        visible = false;
        card.querySelectorAll('.variant-block').forEach(function (vb) {
          var match = vb.dataset.search.indexOf(q) >= 0;
          vb.style.display = match ? '' : 'none';
          if (match) visible = true;
        });
      } else {
        card.querySelectorAll('.variant-block').forEach(function (vb) { vb.style.display = ''; });
      }
      card.classList.toggle('hidden', !visible);
    });
    document.querySelectorAll('.vis-ref-group').forEach(function (rg) {
      var ref = rg.dataset.ref;
      var show = !refFilter || ref === refFilter;
      if (show && q) {
        var any = false;
        rg.querySelectorAll('.vis-variant').forEach(function (row) {
          var match = row.dataset.search.indexOf(q) >= 0;
          row.style.display = match ? '' : 'none';
          if (match) any = true;
        });
        rg.style.display = any ? '' : 'none';
      } else {
        rg.style.display = show ? '' : 'none';
        rg.querySelectorAll('.vis-variant').forEach(function (row) { row.style.display = ''; });
      }
    });
  }

  document.getElementById('search').addEventListener('input', applyFilters);
  document.getElementById('filter-ref').addEventListener('change', applyFilters);

  function updateProgress() {
    var total = 0, done = 0;
    REPORT.refGroups.forEach(function (g) {
      g.variants.forEach(function (v) {
        total++;
        if (validation[v.osmId] && validation[v.osmId].status) done++;
      });
    });
    document.getElementById('progress').textContent = done + ' / ' + total + ' validadas';
  }

  document.getElementById('export-json').addEventListener('click', function () {
    var payload = {
      slug: REPORT.slug, operator: REPORT.operator, cityName: REPORT.cityName,
      exportedAt: new Date().toISOString(), validations: validation,
      routes: REPORT.refGroups.flatMap(function (g) {
        return g.variants.map(function (v) {
          return { osmId: v.osmId, ref: v.ref, from: v.from, to: v.to, direction: v.directionLabel, validation: validation[v.osmId] || null };
        });
      })
    };
    var blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'validacion-' + REPORT.slug + '.json';
    a.click();
    URL.revokeObjectURL(a.href);
  });

  refreshAllStyles();
  updateProgress();

  function invalidateMap() {
    setTimeout(function () { overviewMap.invalidateSize(); }, 50);
  }

  function toggleSidebar() {
    var sb = document.getElementById('map-sidebar');
    sb.classList.toggle('collapsed');
    invalidateMap();
  }

  document.getElementById('toggle-sidebar').addEventListener('click', toggleSidebar);
  document.getElementById('sidebar-toggle-mobile').addEventListener('click', toggleSidebar);
  window.addEventListener('resize', invalidateMap);
  invalidateMap();
})();
  </script>
</body>
</html>
